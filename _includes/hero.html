{% if site.data.settings.hero.enable == true %}
<!-- begin hero -->
<section class="hero">
  <div class="container">
    <div class="hero__inner">
      {% if site.data.settings.hero.hero_image_caption %}
      <p class="hero__tagline">{{ site.data.settings.hero.hero_image_caption }}</p>
      {% endif %}
    </div>
  </div>
</section>
<!-- end hero -->
{% endif %}
