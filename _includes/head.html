<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.data.settings.title }}{% endif %}</title>
  <meta name='description'
    content='{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.data.settings.description }}{% endif %}'>

  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ " /feed.xml" |
    relative_url }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.url == " /" %}{{ site.data.settings.title }}{% else %}{{ page.title }}
    – {{ site.data.settings.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.url == " /" %}{{ site.data.settings.description | strip_html |
    xml_escape }}{% elsif page.description %}{{ page.description | strip_html | xml_escape }}{% else %}{{ page.excerpt |
    strip_html | xml_escape }}{% endif %}">
  {% if page.image %}<meta name="twitter:image:src" content="{{ page.image | absolute_url }}">{% endif %}

  <!-- Facebook OpenGraph -->
  <meta property="og:title" content="{% if page.url == " /" %}{{ site.data.settings.title }}{% else %}{{ page.title }} –
    {{ site.data.settings.title }}{% endif %}">
  <meta property="og:description" content="{% if page.url == " /" %}{{ site.data.settings.description | strip_html |
    xml_escape }}{% elsif page.description %}{{ page.description | strip_html | xml_escape }}{% else %}{{ page.excerpt |
    strip_html | xml_escape }}{% endif %}">
  {% if page.image %}<meta property="og:image" content="{{ page.image | absolute_url }}">{% endif %}
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.data.settings.title }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">


  <script>
    const defaultTheme = "{{ site.data.settings.color_scheme.default }}";
    const isToggleEnabled = {{ site.data.settings.color_scheme.toggle | jsonify }};
    const userTheme = localStorage.getItem("theme");

    function setTheme(mode) {
      if (mode === "dark") {
        document.documentElement.setAttribute("dark", "");
        document.documentElement.classList.add("dark-mode");
      } else if (mode === "light") {
        document.documentElement.removeAttribute("dark");
        document.documentElement.classList.remove("dark-mode");
      }
    }

    if (isToggleEnabled) {
      if (userTheme) {
        setTheme(userTheme);
      } else {
        setTheme(defaultTheme);
      }
    } else {
      setTheme(defaultTheme);
    }

    var savedView = localStorage.getItem("classView");
    if (savedView === "list") {
      document.documentElement.setAttribute("list", "");
      document.documentElement.classList.add('view-list');
    } else if (savedView === "compact") {
      document.documentElement.classList.add('view-compact');
    }
  </script>

  <link rel="stylesheet" href="{{ '/css/main.css' | relative_url }}">

  {% if page.layout == "post" %}
  {% assign schema_desc = page.description | default: page.excerpt | strip_html | strip_newlines | truncate: 300 %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": {{ page.title | jsonify }},
    "description": {{ schema_desc | jsonify }},
    "datePublished": "{{ page.date | date: '%Y-%m-%d' }}",
    "dateModified": "{{ page.last_modified_at | default: page.date | date: '%Y-%m-%d' }}",
    "url": "{{ page.url | absolute_url }}",
    "inLanguage": "{{ page.lang | default: 'en' }}",
    "author": {
      "@type": "Person",
      "name": {{ site.data.settings.author.author_name | jsonify }},
      "url": "{{ '/about/' | absolute_url }}"
    }{% if page.image %},
    "image": "{{ page.image | absolute_url }}"{% endif %}{% if page.tags %},
    "keywords": {{ page.tags | join: ", " | jsonify }}{% endif %}{% if page.series %}{% assign _series = site.data.series | where: "slug", page.series | first %}{% if _series %},
    "isPartOf": {
      "@type": "CreativeWorkSeries",
      "name": {{ _series.title | jsonify }},
      "url": "{{ _series.link | absolute_url }}"
    }{% endif %}{% endif %}
  }
  </script>
  {% endif %}
</head>
