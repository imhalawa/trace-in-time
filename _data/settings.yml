#-------------------------------
# Site Settings
title: Trace in Time
description: "Trace in Time is Mohamed Halawa's blog on software engineering, human behavior, and the patterns beneath both — essays, notes, and reflections on building with clarity."
logo: # You can add own logo. For example '/images/logo.png'.
logo_dark:
show_reading_time: false # Show estimated reading time on posts and article cards


#-------------------------------
# Color Scheme Settings
color_scheme:
  default: light # Default theme applied on the first visit (options: "light" or "dark")
  toggle: true # Enable theme toggle

# Enables or disables the theme toggle functionality:
# - true: Users can switch between light and dark modes using a toggle button.
#          The site will remember their choice for future visits.
# - false: The theme will always use the default mode specified above,
#          and the toggle button will not be displayed.


#-------------------------------
# Navigation Settings
menu_settings:
  menu_items:
    - title: 'Series'
      url: '/series/'
      icon: 'fi fi-stack'
    - title: 'Lists'
      url: '/lists/'
      icon: 'fi fi-list'
      submenu:
      - title: 'Books'
        url: '/lists/books/'
        icon: 'fi fi-book'
      - title: 'Music'
        url: '/lists/music/'
        icon: 'fi fi-music'
      - title: 'Podcasts'
        url: '/lists/podcasts/'
        icon: 'fi fi-headphones'
      - title: 'Projects'
        url: '/lists/projects/'
        icon: 'fi fi-github'
    - url: '/about/'
      title: 'About'
      icon: 'fi fi-person'
    - url: '/contact/'
      title: 'Contact'
      icon: 'fi fi-mail'


#-------------------------------
# Author Settings
author:
  author_name: Mohamed Halawa
  author_name_ar: محمد حلاوة
  author_avatar: /images/author/profile.png


#-------------------------------
# GitHub Settings
github:
  username: imhalawa  # Used to auto-fetch project metadata from the GitHub API


#-------------------------------
# Hero Settings
hero:
  enable: true
  hero_avatar: /images/author/profile.png
  hero_title: Hi! I’m Mohamed
  hero_subtitle: Software engineer, hobbyist photographer, and explorer of meaning and systems
  hero_description: |
    I build systems that make sense — turning ideas into structure, and structure into results.

    Here, I share what I build, photograph, and learn — notes on finding clarity, staying creative, and making progress one step at a time.
  hero_image: /images/site_identity/hero.png # TODO: change image to my own desktop setup
  hero_image_caption: This space is a trace in time — fragments of systems and reflections
  hero_button_text: Get In Touch
  hero_button_link: '/contact/'


