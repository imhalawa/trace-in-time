# ──────────────────────────────────────────────────────────
# Music Favorites  (_data/music.yml)
# ──────────────────────────────────────────────────────────
# Only youtube_id is required. Title and artist are fetched
# automatically at build time from the YouTube oEmbed API
# and cached in _data/.youtube_cache.json.
#
# REQUIRED
#   youtube_id  - the video ID from the YouTube URL
#                 e.g. https://youtube.com/watch?v=<youtube_id>
#
# OPTIONAL (auto-fetched if absent, override anytime)
#   title       - song / track name
#   artist      - performer or composer
#
# OPTIONAL (always manual)
#   genre       - used for the filter pills on the page
#   year        - release year
#   note        - a personal note shown on the card
# ──────────────────────────────────────────────────────────

