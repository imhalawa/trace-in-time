name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Java (for PlantUML)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download PlantUML JAR
        run: |
          mkdir -p vendor
          curl -fsSL "https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar" \
            -o vendor/plantuml.jar

      - name: Convert images to WebP
        run: |
          sudo apt-get install -y webp graphviz
          find images/ -type f \( -name "*.jpg" -o -name "*.jpeg" -o -name "*.png" \) | while read f; do
            out="${f%.*}.webp"
            if [ ! -f "$out" ]; then
              cwebp -q 82 "$f" -o "$out"
            fi
          done

      - name: Build Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
